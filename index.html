<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Список дел</title>
    <meta name="viewport" content="width=device-width, initial-scale=1 viewport-fit=cover">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>

<div class="todo">
    <h1 class="todo__title">Список задач</h1>
    <div class="toolbar todo__toolbar">
        <div class="toolbar toolbar__search">
            <input type="text" class="search__input" placeholder="Поиск задачи..." id="input-search">
            <button type="button" class="btn btn-default btn--icon search__button">
                <svg class="btn__icon" width="21" height="21">
                    <use href="./fonts/sprite/sprite.svg#search"></use>
                </svg>
            </button>
        </div>
        <div class="filter toolbar__filter">
            <button type="button" class="btn btn--filled btn__text filter__button">
                <span class="btn__text">Все задачи</span>
                <svg class="btn__icon btn__chevron" width="7" height="4">
                    <use href="./fonts/sprite/sprite.svg#chevron-top"></use>
                </svg>
            </button>

            <div class="filter__dropdown hidden">
                <ul class="filter__list">
                    <li data-filter="all" class="filter__item">Все</li>
                    <li data-filter="completed" class="filter__item">Завершенные</li>
                    <li data-filter="uncompleted" class="filter__item">Незавершенные</li>
                </ul>
            </div>
        </div>
        <button type="button" class="btn btn--filled btn--icon toolbar__theme-btn">
            <svg class="btn__icon" width="24" height="24">
                <use href="./fonts/sprite/sprite.svg#theme-light"></use>
            </svg>
        </button>
    </div>
    <div class="todo__tasks">
        <!--place for tasks-->
        <ul class="tasks-list__items"></ul>
        <div class="task-list__empty">
            <img src="images/plug-empty.png" alt="Plug">
            <p class="task-list__empty-text">Пусто...</p>
        </div>

    </div>
    <div class="actions todo__actions">
        <button type="button" class="btn actions__clear-btn btn--outline">Удалить все задачи</button>
        <button type="button" class="btn actions__add-btn btn--filled btn--round">
            <svg class="btn__icon" width="24" height="24">
                <use href="./fonts/sprite/sprite.svg#add"></use>
            </svg>
        </button>
    </div>

</div>
<div class="modal modal--hidden">
    <div class="modal__card">
        <h2 class="modal__title"></h2>
        <div class="modal__field">
            <input type="text" class="modal__input" placeholder="Введите задачу...">
        </div>
        <div class="modal__controls">
            <button type="button" class="btn btn--outline modal__btn-cancel">
                <span class="btn__text">Отмена</span>
            </button>
            <button type="button" class="btn btn--filled modal__btn-save">
                <span class="btn__text">Сохранить</span>
            </button>
            <button type="button" id="btnSaveEdit" class="btn btn--filled modal__btn-save">
                <span class="btn__text">SAVE</span>
            </button>
        </div>
    </div>
</div>

<div class="modal modal--hidden" id="celebrationModal">
    <div class="modal__card">
        <h2 class="modal__title">Ты супер! 🎉</h2>
        <p class="modal__text">Все задачи выполнены, можно ехать на море! 🌊☀️</p>
        <button id="btnCloseCelebration" class="btn btn--outline">
            <span class="btn__text">Ура! За билетами! 😎</span>
        </button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
